<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Gestos - Traductor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .display-card {
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .letra-detectada {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #95a5a6;
        }

        .indicator {
            width: 12px;
            height: 12px;
            background-color: #e74c3c;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .indicator.online {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <h1>Intérprete de Señas</h1>
        <p class="subtitle">Lectura en tiempo real desde los sensores</p>

        <div class="display-card">
            <div class="letra-detectada" id="letraObtenida">Cargando...</div>
        </div>

        <div class="status-container">
            <div class="indicator" id="statusIndicator"></div>
            <span id="statusText">Conectando a Firebase...</span>
        </div>
    </div>

    <script>
        // Configuración de Firebase basada en tus datos del ESP32
        const firebaseConfig = {
            databaseURL: "https://proyecto-4250e-default-rtdb.firebaseio.com"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);

        // Referencia a la base de datos
        const dbRef = firebase.database().ref("/mensaje");
        const letraElemento = document.getElementById("letraObtenida");
        const indicador = document.getElementById("statusIndicator");
        const textoEstado = document.getElementById("statusText");

        // Escuchar cambios en tiempo real
        dbRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                letraElemento.innerText = data;
                
                // Actualizar interfaz a estado conectado exitosamente
                indicador.classList.add("online");
                textoEstado.innerText = "Sistema en línea";
            } else {
                letraElemento.innerText = "Sin Datos";
                indicador.classList.remove("online");
                textoEstado.innerText = "Nodo vacío en la BD";
            }
        }, (error) => {
            console.error("Error al leer de Firebase: ", error);
            letraElemento.innerText = "Error";
            indicador.classList.remove("online");
            textoEstado.innerText = "Error de conexión";
        });
    </script>
</body>
</html>
