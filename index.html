<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sense-Vox - Traductor de Lenguaje de Señas</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        header h1 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 2.5rem;
        }

        header p {
            color: #64748b;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .traduccion {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .estado-conexion {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #64748b;
            background: #e2e8f0;
            padding: 6px 16px;
            border-radius: 50px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        .dot.conectado {
            background-color: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sense-Vox</h1>
            <p>Traducción de Lenguaje de Señas en Tiempo Real</p>
        </header>

        <main class="card">
            <h2>Gesto Detectado</h2>
            <div id="letra-traducida" class="traduccion">Cargando...</div>
            
            <div class="estado-conexion">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Desconectado de Firebase</span>
            </div>
        </main>
    </div>

    <script>
        // Configuración de tu base de datos de Firebase
        const firebaseConfig = {
            databaseURL: "https://proyecto-4250e-default-rtdb.firebaseio.com"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Referencia directa al nodo de la traducción (Excluyendo el monitor serial)
        const letraRef = database.ref('/letra_traducida');
        
        // Elementos del DOM
        const letraContenedor = document.getElementById('letra-traducida');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Escuchar cambios en tiempo real de la letra traducida
        letraRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const valor = snapshot.val();
                letraContenedor.innerText = valor;
                
                // Actualizar interfaz a conectado exitosamente
                statusDot.classList.add('conectado');
                statusText.innerText = "Sistema en Línea";
            } else {
                letraContenedor.innerText = "Esperando Gesto...";
            }
        }, (error) => {
            console.error("Error al leer Firebase: ", error);
            letraContenedor.innerText = "Error";
            statusDot.classList.remove('conectado');
            statusText.innerText = "Error de Conexión";
        });
    </script>

</body>
</html>
