<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Gestos - Traductor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .selector-box {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: #34495e;
            display: block;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            background-color: #fff;
            color: #333;
            font-size: 14px;
            outline: none;
        }

        .display-card {
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .letra-detectada {
            font-size: 44px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 15px;
        }

        .indicator {
            width: 12px;
            height: 12px;
            background-color: #e74c3c;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .indicator.online {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* Consola de errores interna */
        .error-log {
            background-color: #fadbd8;
            border: 1px solid #e74c3c;
            color: #78281f;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <h1>Intérprete de Señas</h1>
        <p class="subtitle">Lectura en tiempo real con selección de voz</p>

        <div class="selector-box">
            <label for="voiceSelect">Selecciona el tipo de voz:</label>
            <select id="voiceSelect"><option>Cargando voces...</option></select>
        </div>

        <div class="display-card">
            <div class="letra-detectada" id="letraObtenida">Buscando Base de Datos...</div>
        </div>

        <div class="status-container">
            <div class="indicator" id="statusIndicator"></div>
            <span id="statusText">Intentando conectar...</span>
        </div>

        <div class="error-log" id="errorLog">Historial del sistema: Listo para capturar errores.</div>
    </div>

    <script>
        const logElement = document.getElementById("errorLog");
        
        function agregarLog(mensaje) {
            logElement.innerText += "\n> " + mensaje;
            console.log(mensaje);
        }

        // Configuración de Firebase
        const firebaseConfig = {
            databaseURL: "https://proyecto-4250e-default-rtdb.firebaseio.com"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            agregarLog("Firebase Inicializado correctamente.");
        } catch (e) {
            agregarLog("Error al inicializar Firebase SDK: " + e.message);
        }

        const dbRef = firebase.database().ref("/letra_traducida");
        const letraElemento = document.getElementById("letraObtenida");
        const indicador = document.getElementById("statusIndicator");
        const textoEstado = document.getElementById("statusText");
        const voiceSelect = document.getElementById("voiceSelect");

        let ultimoTextoHablado = "";
        let listaVoces = [];

        function cargarVoces() {
            if (!('speechSynthesis' in window)) return;
            listaVoces = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            const vocesEspañol = listaVoces.filter(voz => voz.lang.startsWith('es'));

            if (vocesEspañol.length === 0) {
                listaVoces.forEach((voz) => {
                    const option = document.createElement('option');
                    option.value = voz.name;
                    option.textContent = `${voz.name} (${voz.lang})`;
                    voiceSelect.appendChild(option);
                });
            } else {
                vocesEspañol.forEach((voz) => {
                    const option = document.createElement('option');
                    option.value = voz.name;
                    option.textContent = voz.name.replace("Microsoft", "").replace("Google", "").trim();
                    voiceSelect.appendChild(option);
                });
            }
        }

        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = cargarVoces;
        }
        cargarVoces();

        function textToSpeech(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            let textoLimpio = texto.replace("=", ""); 
            const mensajeVoz = new SpeechSynthesisUtterance(textoLimpio);
            const nombreVozSeleccionada = voiceSelect.value;
            const vozElegida = listaVoces.find(voz => voz.name === nombreVozSeleccionada);
            if (vozElegida) mensajeVoz.voice = vozElegida;
            window.speechSynthesis.speak(mensajeVoz);
        }

        // ESCUCHAR EN TIEMPO REAL CON MANEJO DE CAÍDAS
        agregarLog("Esperando respuesta del servidor de Firebase...");
        
        dbRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                agregarLog("¡Dato recibido con éxito!: " + data);
                
                letraElemento.innerText = data;
                indicador.classList.add("online");
                textoEstado.innerText = "Sistema en línea";

                if (data !== ultimoTextoHablado) {
                    if (data !== "Ningun gesto") {
                        textToSpeech(data);
                    }
                    ultimoTextoHablado = data;
                }
            } else {
                letraElemento.innerText = "Nodo no encontrado";
                indicador.classList.remove("online");
                textoEstado.innerText = "Ruta vacía en la BD";
                agregarLog("Alerta: El nodo '/letra_traducida' no contiene datos válidos.");
            }
        }, (error) => {
            letraElemento.innerText = "Error de Acceso";
            indicador.classList.remove("online");
            textoEstado.innerText = "Denegado por Firebase";
            agregarLog("ERROR CRÍTICO: Firebase rechazó la lectura. Motivo: " + error.message);
        });
    </script>
</body>
</html>
