<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor de Señas - Monitor de Voz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 85%; 
            max-width: 500px; 
        }
        h1 { 
            color: #1a73e8; 
            margin-bottom: 5px;
            font-size: 2rem;
        }
        p {
            color: #5f6368;
            font-size: 1rem;
            margin-top: 0;
        }
        #log-conexion {
            font-size: 0.85rem;
            color: #80868b;
            font-style: italic;
            margin-bottom: 15px;
        }
        #mensaje-texto { 
            font-size: 2.8rem; 
            font-weight: bold; 
            color: #202124; 
            margin: 35px 0; 
            min-height: 70px;
            text-transform: uppercase;
            word-wrap: break-word;
        }
        .status { 
            font-size: 0.9rem; 
            color: #5f6368; 
            background-color: #f1f3f4;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 500;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sistema Sense-Vox</h1>
        <p>Traductor de Lenguaje de Señas en Tiempo Real</p>
        <div id="log-conexion">Esperando reporte del sistema...</div>
        <hr style="border: 0; border-top: 1px solid #f1f3f4; margin: 20px 0;">
        <div id="mensaje-texto">Esperando seña...</div>
        <div id="estado-sistema" class="status">● Comprobando...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYoC5DxEJIckUDNbEmwGN0YK3zqo4ve7k",
            authDomain: "proyecto-4250e.firebaseapp.com",
            databaseURL: "https://proyecto-4250e-default-rtdb.firebaseio.com",
            projectId: "proyecto-4250e",
            storageBucket: "proyecto-4250e.firebasestorage.app",
            messagingSenderId: "789688204601",
            appId: "1:789688204601:web:3f3abdfe0d66b373da7ce8"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let ultimoTexto = "";

        // 1. ESCUCHAR REPORTE O MENSAJES DE CONEXIÓN INICIAL (Ruta: /mensaje)
        database.ref('mensaje').on('value', (snapshot) => {
            const msg = snapshot.val();
            if (msg) {
                document.getElementById('log-conexion').innerText = msg;
            }
        });

        // 2. ESCUCHAR LA LETRA O PALABRA TRADUCIDA (Ruta: /letra_traducida)
        database.ref('letra_traducida').on('value', (snapshot) => {
            const texto = snapshot.val();
            
            if (texto && texto !== ultimoTexto) {
                ultimoTexto = texto;
                document.getElementById('mensaje-texto').innerText = texto;
                
                const synth = window.speechSynthesis;
                const enunciar = new SpeechSynthesisUtterance(texto);
                enunciar.lang = 'es-COL';
                enunciar.rate = 1.0;
                enunciar.pitch = 1.0;
                synth.speak(enunciar);
            }
        });

        // 3. ESCUCHAR EL ESTADO VIVO/MUERTO DEL HARDWARE (Ruta: /estado)
        database.ref('estado').on('value', (snapshot) => {
            const estado = snapshot.val();
            const elEstado = document.getElementById('estado-sistema');
            
            if (estado) {
                elEstado.innerText = "● " + estado.toUpperCase();
                if (estado.toLowerCase() === "conectado") {
                    elEstado.style.backgroundColor = "#e6f4ea";
                    elEstado.style.color = "#137333";
                } else {
                    elEstado.style.backgroundColor = "#fce8e6";
                    elEstado.style.color = "#c5221f";
                    document.getElementById('mensaje-texto').innerText = "---"; // Resetea la pantalla si se desconecta
                }
            }
        });

        document.body.addEventListener('click', () => {
            console.log("Audio verificado.");
        });
    </script>

</body>
</html>
