<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor de Gestos Directo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #121214; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .wrapper { background-color: #202024; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        h1 { font-size: 22px; margin-bottom: 20px; color: #00b37e; }
        
        /* Selector de voz sencillo */
        .voice-box { margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; color: #a8a8b3; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; background: #121214; border: 1px solid #29292e; color: #fff; border-radius: 6px; }

        /* Caja gigante donde sale la letra */
        .letra-box { background-color: #121214; padding: 40px 10px; border-radius: 8px; border: 2px solid #00b37e; margin-bottom: 20px; }
        .letra { font-size: 38px; font-weight: bold; color: #00b37e; }
        
        .status { font-size: 13px; color: #8d8d99; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Intérprete de Señas</h1>

        <div class="voice-box">
            <label>Tipo de Voz:</label>
            <select id="selectorVoces"><option>Cargando voces...</option></select>
        </div>

        <div class="letra-box">
            <div class="letra" id="pantallaLetra">Esperando Guante...</div>
        </div>

        <div class="status" id="textoConexion">Intentando conectar con Firebase...</div>
    </div>

    <script>
        const pantalla = document.getElementById("pantallaLetra");
        const estado = document.getElementById("textoConexion");
        const selector = document.getElementById("selectorVoces");
        
        let ultimaLetra = "";
        let listaVoces = [];

        // 1. MOTOR DE VOZ ULTRA SIMPLE
        function inicializarVoces() {
            if (!('speechSynthesis' in window)) return;
            listaVoces = window.speechSynthesis.getVoices();
            selector.innerHTML = '';
            
            // Filtra solo voces en español
            let vocesEs = listaVoces.filter(v => v.lang.startsWith('es'));
            if(vocesEs.length === 0) vocesEs = listaVoces; // Si no hay, muestra las que tenga

            vocesEs.forEach(voz => {
                const opt = document.createElement('option');
                opt.value = voz.name;
                opt.textContent = voz.name.replace("Microsoft", "").replace("Google", "").trim();
                selector.appendChild(opt);
            });
        }
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = inicializarVoces;
        }
        inicializarVoces();

        function hablar(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            let textoLimpio = texto.replace("=", "").replace("Letra", "Letra ");
            const utterance = new SpeechSynthesisUtterance(textoLimpio);
            
            const vozSeleccionada = listaVoces.find(v => v.name === selector.value);
            if (vozSeleccionada) utterance.voice = vozSeleccionada;
            
            window.speechSynthesis.speak(utterance);
        }

        // 2. CONEXIÓN DIRECTA POR HTTP (Evita bloqueos de seguridad y CORS)
        // Agregamos un número aleatorio al final para obligar al navegador a traer el dato nuevo sin usar caché
        const urlFirebase = "https://proyecto-4250e-default-rtdb.firebaseio.com/letra_traducida.json";

        function consultarFirebase() {
            fetch(`${urlFirebase}?nocache=${new Date().getTime()}`)
                .then(response => response.json())
                .then(data => {
                    if (data) {
                        // Forzar a que pinte el texto en la pantalla siempre
                        pantalla.innerText = data;
                        estado.innerText = "Conectado por canal directo";
                        estado.style.color = "#00b37e";

                        // Lógica para hablar solo si cambió y no es reposo
                        if (data !== ultimaLetra) {
                            if (data !== "Ningun gesto") {
                                hablar(data);
                            }
                            ultimaLetra = data;
                        }
                    } else {
                        pantalla.innerText = "Sin Datos";
                        estado.innerText = "Nodo vacío o inexistente";
                    }
                })
                .catch(error => {
                    console.error(error);
                    estado.innerText = "Buscando señal del ESP32...";
                    estado.style.color = "#f75a68";
                });
        }

        // Consultar automáticamente cada 400 milisegundos de forma transparente
        setInterval(consultarFirebase, 400);

        // Habilitar audio con un toque en la pantalla
        document.body.addEventListener('click', () => {
            if(ultimaLetra && ultimaLetra !== "Ningun gesto") hablar(ultimaLetra);
        });
    </script>
</body>
</html>
